# =============================================================================
# ProtheusImporter - configuracoes
# -----------------------------------------------------------------------------
# Linhas iniciadas com # ou ; sao ignoradas.
# Valores em branco: usam padrao do codigo OU ignora a etapa correspondente.
# Paths podem ser absolutos (D:\...) ou relativos ao exe.
# =============================================================================

[Banco]
# Path do SQLite do ARJ. Se vazio, usa ../app/Database/ArjSysDB.db relativo ao exe.
# DbPath=..\app\Database\ArjSysDB.db
DbPath=C:\PRG\TC\BACK\app\Database\ArjSysDB.db


[CSV]
# Separador usado nos arquivos CSV do Protheus (padrao: ;).
Separador=;

# Nomes dos arquivos CSV. Se vazio, o menu pede o caminho na hora.
#ArquivoSB1=SB1 - MENOR.csv
ArquivoSB1=SB1.csv

#ArquivoSG1=SG1 - MENOR.csv
ArquivoSG1=SG1.csv

# Pasta base onde os CSVs estao. Se vazio, usa a mesma pasta do exe.
PastaCSV=C:\PRG\TC\CSV

# Numero maximo de linhas a procurar o header antes de desistir.
MaxLinhasBuscaHeader=20


[Importacao]
# Quantidade de registros por batch no SaveChanges. Evita estouro de memoria.
BatchSize=500

# SG1 especifico: quando o CSV tem mesmo pai+filho com Sequencias DIFERENTES
# (caso legitimo do Protheus), como o ARJ ainda nao guarda Sequencia na Estrutura:
#   true         = soma as Quantidades e grava 1 linha consolidada (recomendado por enquanto)
#   false/vazio  = mantem so a ultima ocorrencia (usar quando ARJ ja tiver Sequencia)
SomarSequenciasRepetidas=true


[Confirmacoes]
# true  = pergunta antes de executar (interativo)
# false = pula o prompt e segue direto
ConfirmarAntesDeImportar=true
ConfirmarReset=true
ConfirmarUpsert=true


[Perigo]
# Libera o modo "Reset em cascata" — quando o usuario escolher Resetar no menu,
# o importer apaga a tabela alvo E TODAS AS TABELAS QUE DEPENDEM DELA (FK).
# Exemplo: reset de Produtos -> tambem apaga Estruturas, NS, OP, OP Itens, OP Historico.
#
# Uso previsto: apenas em fase de teste/implantacao inicial, quando o banco
# ainda nao tem dados relevantes. EM PRODUCAO, DEIXE false.
#
# Mesmo com true, o importer PEDE CONFIRMACAO EXPLICITA (digitando uma frase)
# antes de apagar qualquer coisa.
#
# Valores aceitos: true / false (qualquer outra coisa = false).
PermitirResetCascata=true


[Relatorio]
# Liga/desliga a geracao do arquivo de relatorio.
# true  = gera relatorio no final de cada importacao
# false ou vazio = nao gera
GerarRelatorio=true

# Pasta onde o relatorio sera gravado.
# Vazio = mesma pasta do exe.
# Pode ser absoluta (C:\...) ou relativa ao exe (..\logs).
CaminhoRelatorio=

# Nome do arquivo de relatorio. Pode ser qualquer nome; extensao .log/.txt recomendada.
NomeRelatorio=ProtheusImporter.log

# true  = sobrescreve o arquivo a cada execucao (apaga o anterior).
# false ou vazio = adiciona o novo relatorio ao final (append), com divisor entre eles.
Sobrescrever=false
